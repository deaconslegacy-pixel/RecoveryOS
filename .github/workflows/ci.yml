name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: recoveryos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTEST_ADDOPTS: ""
        run: python -m pytest -q tests app/test.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps || npm ci
          npm run build

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/deaconslegacy-pixel/recoveryos:latest

  deploy-to-cloud-run:
    needs: build-test-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy configuration
        id: resolve
        env:
          INPUT_PROJECT_ID: ${{ secrets.GCP_PROJECT || vars.GCP_PROJECT }}
          INPUT_REGION: ${{ secrets.GCP_REGION || vars.GCP_REGION }}
          INPUT_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE || vars.CLOUD_RUN_SERVICE }}
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          PROJECT_ID="$(printf '%s' "$INPUT_PROJECT_ID" | tr -d '\r\n' | xargs)"
          REGION="$(printf '%s' "$INPUT_REGION" | tr -d '\r\n' | xargs)"
          SERVICE="$(printf '%s' "$INPUT_SERVICE" | tr -d '\r\n' | xargs)"

          if [ -z "$PROJECT_ID" ] && [ -n "$GCP_SA_KEY_JSON" ]; then
            PROJECT_ID="$(printf '%s' "$GCP_SA_KEY_JSON" | jq -r '.project_id // empty')"
          fi

          if [ -z "$REGION" ]; then
            REGION="us-central1"
          fi

          IMAGE_REPO="${REGION}-docker.pkg.dev/${PROJECT_ID}/recoveryos/recoveryos"
          IMAGE_URI="${IMAGE_REPO}:${GITHUB_SHA}"

          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "region=$REGION" >> "$GITHUB_OUTPUT"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "image_repo=$IMAGE_REPO" >> "$GITHUB_OUTPUT"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Validate deploy configuration
        run: |
          test -n "${{ steps.resolve.outputs.project_id }}" || (echo "Missing deploy config: set GCP_PROJECT as a repository secret/variable or ensure project_id exists in GCP_SA_KEY" && exit 1)
          test -n "${{ steps.resolve.outputs.service }}" || (echo "Missing deploy config: set CLOUD_RUN_SERVICE to the service name mapped to your website domain" && exit 1)
          case "${{ steps.resolve.outputs.image_uri }}" in
            /*|*"//"*|":")
              echo "Invalid image URI generated: '${{ steps.resolve.outputs.image_uri }}'"
              exit 1
              ;;
          esac

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.resolve.outputs.project_id }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker --quiet ${{ steps.resolve.outputs.region }}-docker.pkg.dev

      - name: Build and push to Artifact Registry
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.resolve.outputs.image_uri }}

      - name: Build Cloud Run env vars
        id: runtime_env
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
        run: |
          DATABASE_URL_CLEAN="$(printf '%s' "$DATABASE_URL" | tr -d '\r\n' | xargs)"
          ALLOWED_ORIGINS_CLEAN="$(printf '%s' "$ALLOWED_ORIGINS" | tr -d '\r\n' | xargs)"
          {
            echo "env_vars<<EOF"
            echo "RECOVERYOS_BUILD_ID=${GITHUB_SHA}"
            if [ -n "$DATABASE_URL_CLEAN" ]; then
              echo "DATABASE_URL=$DATABASE_URL_CLEAN"
            fi
            if [ -n "$ALLOWED_ORIGINS_CLEAN" ]; then
              echo "ALLOWED_ORIGINS=$ALLOWED_ORIGINS_CLEAN"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          project_id: ${{ steps.resolve.outputs.project_id }}
          service: ${{ steps.resolve.outputs.service }}
          image: ${{ steps.resolve.outputs.image_uri }}
          region: ${{ steps.resolve.outputs.region }}
          env_vars: ${{ steps.runtime_env.outputs.env_vars }}

      - name: Route 100% traffic to latest revision
        run: |
          gcloud run services update-traffic "${{ steps.resolve.outputs.service }}" \
            --region "${{ steps.resolve.outputs.region }}" \
            --to-latest

      - name: Verify deployed branding and build stamp
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          URL="${{ steps.deploy.outputs.url }}/ui"
          test -n "$URL"
          HTTP_CODE="$(curl -sS -o /tmp/recoveryos-ui-check.html -w '%{http_code}' -H 'Cache-Control: no-cache' "$URL")"
          if [ "$HTTP_CODE" = "200" ]; then
            grep -q "RecoveryOS by Deacons Legacy" /tmp/recoveryos-ui-check.html
            grep -q "$SHORT_SHA" /tmp/recoveryos-ui-check.html
          elif [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ]; then
            echo "Cloud Run endpoint is protected (HTTP $HTTP_CODE). Skipping public content verification."
          else
            echo "Unexpected HTTP status from $URL: $HTTP_CODE"
            exit 1
          fi
