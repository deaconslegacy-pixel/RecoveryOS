name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: recoveryos-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTEST_ADDOPTS: ""
        run: python -m pytest -q tests app/test.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps || npm ci
          npm run build

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/deaconslegacy-pixel/recoveryos:latest

  deploy-to-cloud-run:
    needs: build-test-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy configuration
        id: resolve
        env:
          INPUT_PROJECT_ID: ${{ secrets.GCP_PROJECT || vars.GCP_PROJECT }}
          INPUT_REGION: ${{ secrets.GCP_REGION || vars.GCP_REGION }}
          INPUT_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE || vars.CLOUD_RUN_SERVICE }}
          GCP_SA_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          PROJECT_ID="$INPUT_PROJECT_ID"
          REGION="$INPUT_REGION"
          SERVICE="$INPUT_SERVICE"

          if [ -z "$PROJECT_ID" ] && [ -n "$GCP_SA_KEY_JSON" ]; then
            PROJECT_ID="$(printf '%s' "$GCP_SA_KEY_JSON" | jq -r '.project_id // empty')"
          fi

          if [ -z "$REGION" ]; then
            REGION="us-central1"
          fi

          if [ -z "$SERVICE" ]; then
            SERVICE="recoveryos"
          fi

          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"
          echo "region=$REGION" >> "$GITHUB_OUTPUT"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"

      - name: Validate deploy configuration
        run: |
          test -n "${{ steps.resolve.outputs.project_id }}" || (echo "Missing deploy config: set GCP_PROJECT as a repository secret/variable or ensure project_id exists in GCP_SA_KEY" && exit 1)

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ steps.resolve.outputs.project_id }}

      - name: Log in to Artifact Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ steps.resolve.outputs.region }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push to Artifact Registry
        uses: docker/build-push-action@v4
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.resolve.outputs.region }}-docker.pkg.dev/${{ steps.resolve.outputs.project_id }}/recoveryos/recoveryos:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v1
        with:
          project_id: ${{ steps.resolve.outputs.project_id }}
          service: ${{ steps.resolve.outputs.service }}
          image: ${{ steps.resolve.outputs.region }}-docker.pkg.dev/${{ steps.resolve.outputs.project_id }}/recoveryos/recoveryos:${{ github.sha }}
          region: ${{ steps.resolve.outputs.region }}
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            RECOVERYOS_BUILD_ID=${{ github.sha }}

      - name: Verify deployed branding and build stamp
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          test -n "${{ steps.deploy.outputs.url }}"
          curl -fsSL -H 'Cache-Control: no-cache' "${{ steps.deploy.outputs.url }}/ui" | grep -q "RecoveryOS by Deacons Legacy"
          curl -fsSL -H 'Cache-Control: no-cache' "${{ steps.deploy.outputs.url }}/ui" | grep -q "$SHORT_SHA"
